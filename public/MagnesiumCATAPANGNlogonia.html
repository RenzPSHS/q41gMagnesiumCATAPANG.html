<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nlogonia Map Tracker - Renz Edbon A. Catapang</title>
    <meta name="author" content="Renz Edbon A. Catapang">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #efefef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 { color: #00d2ff; text-align: center; margin: 0; font-size: 1.5rem; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #252525;
            padding: 15px;
            border-radius: 10px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: #00d2ff; }

        button {
            grid-column: span 2;
            background: #00d2ff;
            color: #121212;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #00b8e6; transform: translateY(-1px); }

        /* MAP AREA */
        #map-frame {
            width: 300px;
            height: 300px;
            background: #252525;
            border: 2px solid #333;
            position: relative;
            align-self: center;
            border-radius: 8px;
            overflow: hidden;
        }

        .cross-v { position: absolute; height: 100%; width: 2px; background: rgba(255, 71, 87, 0.6); left: 50%; }
        .cross-h { position: absolute; width: 100%; height: 2px; background: rgba(255, 71, 87, 0.6); top: 50%; }

        .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #2ed573;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #2ed573;
            z-index: 5;
        }

        /* SPRITE BOXES */
        .sprite {
            width: 40px;
            height: 40px;
            display: inline-block;
            background-image: url('../assets/imageSprites.png');
            background-repeat: no-repeat;
            background-size: 40px 200px;
            vertical-align: middle;
        }

        /* Sprite Mapping */
        .no { background-position: 0 0; }
        .ne { background-position: 0 -40px; }
        .se { background-position: 0 -80px; }
        .so { background-position: 0 -120px; }
        .dv { background-position: 0 -160px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { color: #888; padding: 10px; border-bottom: 2px solid #333; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
        .res-text { font-weight: bold; color: #00d2ff; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Nlogonia Locator</h1>

        <div class="controls">
            <div class="field"><label>Div N</label><input type="number" id="divN" value="2"></div>
            <div class="field"><label>Div M</label><input type="number" id="divM" value="1"></div>
            <div class="field"><label>Res X</label><input type="number" id="resX" value="10"></div>
            <div class="field"><label>Res Y</label><input type="number" id="resY" value="10"></div>
            <button onclick="calculate()">Locate Residence</button>
        </div>

        <div id="map-frame">
            <div class="cross-v"></div>
            <div class="cross-h"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Coordinates</th>
                    <th>Icon</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="log"></tbody>
        </table>
    </div>

    <script>
        function calculate() {
            const n = parseInt(document.getElementById('divN').value);
            const m = parseInt(document.getElementById('divM').value);
            const x = parseInt(document.getElementById('resX').value);
            const y = parseInt(document.getElementById('resY').value);

            let result = "";
            let spriteClass = "";

            // Logic for Nlogonia
            if (x === n || y === m) {
                result = "divisa";
                spriteClass = "dv";
            } else if (x > n && y > m) {
                result = "NE";
                spriteClass = "ne";
            } else if (x < n && y > m) {
                result = "NO";
                spriteClass = "no";
            } else if (x > n && y < m) {
                result = "SE";
                spriteClass = "se";
            } else {
                result = "SO";
                spriteClass = "so";
            }

            plotOnMap(n, m, x, y);

            const tbody = document.getElementById('log');
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>${x}, ${y}</td>
                <td><div class="sprite ${spriteClass}"></div></td>
                <td class="res-text">${result}</td>
            `;
            
            tbody.prepend(row);
        }

        function plotOnMap(n, m, x, y) {
            const frame = document.getElementById('map-frame');
            
            const oldDot = frame.querySelector('.dot');
            if (oldDot) oldDot.remove();

            const centerX = 150;
            const centerY = 150;


            let dx = x - n;
            let dy = y - m;

            let maxCoord = Math.max(Math.abs(dx), Math.abs(dy), 10);
            let scale = 140 / maxCoord;

            const dot = document.createElement('div');
            dot.className = 'dot';
            
            dot.style.left = (centerX + (dx * scale)) + 'px';
            dot.style.top = (centerY - (dy * scale)) + "px";

            frame.appendChild(dot);
        }
    </script>
</body>
</html>
